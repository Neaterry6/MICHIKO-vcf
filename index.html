<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MICHIKO VCF</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono&display=swap" rel="stylesheet">

<!-- REAL ICONS -->
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>

<style>
:root{
  --bg:#050508;
  --card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
  --text:#e8eaf0;
  --muted:#94a3b8;
  --accent:#00ff88;
}

body.light{
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* CARD */
.container{
  width:90%;
  max-width:500px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:30px;
  backdrop-filter: blur(15px);
}

/* TITLE */
h1{
  text-align:center;
  font-size:2.5rem;
  font-weight:800;
  margin-bottom:20px;
}

/* INPUT */
.input-group{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin:10px 0;
}

.flag{
  font-size:20px;
  margin-right:10px;
}

input{
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  width:100%;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00ff88,#00cfff);
  color:#000;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* PROGRESS */
.progress-bar{
  background:var(--border);
  border-radius:10px;
  margin-top:15px;
}
.progress{
  height:10px;
  background:var(--accent);
  width:0%;
  border-radius:10px;
}

/* COUNT */
#count{
  font-family:'DM Mono', monospace;
  text-align:center;
}

/* TOGGLE */
.toggle{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:22px;
}

/* FOOTER */
.footer{
  margin-top:30px;
  text-align:center;
  font-size:14px;
  color:var(--muted);
}
.footer a{
  color:#38bdf8;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- THEME TOGGLE -->
<div class="toggle" onclick="toggleTheme()">
  <span class="iconify" data-icon="mdi:theme-light-dark"></span>
</div>

<h1>MICHIKO VCF</h1>

<div class="container">

  <div class="input-group">
    <input id="name" placeholder="Name">
  </div>

  <div class="input-group">
    <span class="flag" id="flag">🌍</span>
    <input id="number" placeholder="+234..." oninput="detectCountry()">
  </div>

  <button onclick="submitData()">Submit</button>

  <h3 id="count">0 / 150</h3>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <button onclick="downloadVCF()">Download VCF</button>

</div>

<!-- FOOTER -->
<div class="footer">

  <p><strong>Channels:</strong></p>
  <a href="https://youtube.com/@shefzytechinc?si=htx780zL8z7QFTzd">YouTube</a> |
  <a href="https://whatsapp.com/channel/0029Vb7YExu8vd1W6ruYSI23">WhatsApp</a> |
  <a href="https://t.me/michikoinc">Telegram</a>

  <p style="margin-top:15px;"><strong>Contact Owner:</strong></p>
  <a href="wa.me/2349028711461">WhatsApp</a> |
  <a href="t.me/Lag_aan">Telegram</a>

  <p style="margin-top:15px;">© 2026 MICHIKO BOT INC.</p>

</div>

<script>
let users = [];
const maxUsers = 150;

/* COUNTRY FLAG DETECT */
function detectCountry(){
  const num = document.getElementById("number").value;

  if(num.startsWith("+234")) document.getElementById("flag").innerText="🇳🇬";
  else if(num.startsWith("+1")) document.getElementById("flag").innerText="🇺🇸";
  else if(num.startsWith("+44")) document.getElementById("flag").innerText="🇬🇧";
  else document.getElementById("flag").innerText="🌍";
}

/* THEME TOGGLE */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* API */
async function fetchUsers(){
 const res = await fetch("/api/contacts");
 users = await res.json();
 updateUI();
}

function updateUI(){
 const count = users.length;
 const percent = (count/maxUsers)*100;
 document.getElementById("count").innerText = `${count} / ${maxUsers}`;
 document.getElementById("progress").style.width = percent + "%";
}

async function submitData(){
 const name = document.getElementById("name").value;
 const number = document.getElementById("number").value;

 const res = await fetch("/api/add", {
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body: JSON.stringify({name, number})
 });

 const data = await res.json();
 alert(data.message);
 fetchUsers();
}

function downloadVCF(){
 if(users.length < maxUsers){
  alert("Not complete yet");
  return;
 }

 let vcf="";
 users.forEach(u=>{
  vcf += `BEGIN:VCARD\nVERSION:3.0\nFN:${u.name}\nTEL:${u.number}\nEND:VCARD\n`;
 });

 const blob = new Blob([vcf]);
 const a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "MICHIKO.vcf";
 a.click();
}

fetchUsers();
setInterval(fetchUsers, 3000);
</script>

</body>
</html>
